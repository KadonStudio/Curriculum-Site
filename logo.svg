<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400">
  <defs>
    <linearGradient id="a" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#22AEE4"/>
      <stop offset="100%" stop-color="#0F6EB7"/>
    </linearGradient>
    <linearGradient id="b" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#6EB3D4"/>
      <stop offset="100%" stop-color="#22AEE4"/>
    </linearGradient>
    <clipPath id="c">
      <ellipse cx="160" cy="118" rx="108" ry="116"/>
    </clipPath>
  </defs>

  <!-- Fingerprint ridges clipped to oval -->
  <g clip-path="url(#c)" fill="none" stroke-linecap="round">
    <ellipse cx="160" cy="118" rx="10"  ry="11"  stroke="url(#a)" stroke-width="5"/>
    <ellipse cx="160" cy="118" rx="21"  ry="23"  stroke="url(#a)" stroke-width="4.8"/>
    <ellipse cx="160" cy="118" rx="33"  ry="37"  stroke="url(#a)" stroke-width="4.5"/>
    <ellipse cx="160" cy="118" rx="45"  ry="50"  stroke="url(#a)" stroke-width="4.2"/>
    <ellipse cx="160" cy="118" rx="57"  ry="63"  stroke="url(#a)" stroke-width="4"/>
    <ellipse cx="160" cy="118" rx="69"  ry="76"  stroke="url(#b)" stroke-width="3.8"/>
    <ellipse cx="160" cy="118" rx="81"  ry="89"  stroke="url(#b)" stroke-width="3.6"/>
    <ellipse cx="160" cy="118" rx="93"  ry="102" stroke="url(#b)" stroke-width="3.4"/>
    <ellipse cx="160" cy="118" rx="105" ry="115" stroke="url(#b)" stroke-width="3.2"/>
  </g>

  <!-- THUMBPRINT -->
  <text x="160" y="272"
        text-anchor="middle"
        font-family="Montserrat, 'Arial Black', Arial, sans-serif"
        font-weight="800"
        font-size="48"
        letter-spacing="1">
    <tspan fill="#22AEE4">THUMB</tspan><tspan fill="#2E2E36">PRINT</tspan>
  </text>

  <!-- CURRICULUM -->
  <text x="160" y="308"
        text-anchor="middle"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="600"
        font-size="17"
        fill="#59565F"
        letter-spacing="7">CURRICULUM</text>
</svg>
